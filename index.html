<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Vocabulario Avanzado - Clase</title>
    
    <style>
        :root { --p: #2c3e50; --a: #3498db; --bg: #f4f7f6; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .card-container { 
            perspective: 1000px; 
            width: 90vw; 
            max-width: 450px; 
            height: 300px; 
            cursor: pointer;
            /* Parche Safari */
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        .card { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            transition: transform 0.4s; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-radius: 15px;
            /* Parche Safari para 3D */
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }

        .card.flipped { transform: rotateY(180deg); }

        .face { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 25px; 
            box-sizing: border-box; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 1.4rem;
            /* Parche Safari para ocultar la cara trasera */
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .front { background: white; color: var(--p); font-weight: bold; border: 2px solid #ddd; }
        .back { background: var(--a); color: white; transform: rotateY(180deg); font-size: 1.2rem; }

        .controls { 
            margin-top: 30px; 
            display: flex; 
            gap: 10px; 
            width: 90vw; 
            max-width: 450px;
        }

        button { 
            flex: 1;
            padding: 18px 10px; 
            border: none; 
            border-radius: 12px; 
            background: var(--p); 
            color: white; 
            font-size: 1rem; 
            font-weight: bold;
            touch-action: manipulation;
        }

        .info { margin-top: 15px; font-weight: bold; color: #7f8c8d; }

        /* Ajustes específicos para móviles muy pequeños */
        @media (max-height: 600px) {
            .card-container { height: 220px; }
            .face { font-size: 1.1rem; }
        }
    </style>
</head>

    <div class="card-container" onclick="flip()">

    let idx = 0;
    const cardEl = document.getElementById('c');
    const qEl = document.getElementById('q');
    const aEl = document.getElementById('a');
    const sEl = document.getElementById('status');

    function update() {
        cardEl.classList.remove('flipped');
        setTimeout(() => {
            qEl.innerText = data[idx].q;
            aEl.innerText = data[idx].a;
            sEl.innerText = `${idx + 1} / ${data.length}`;
        }, 100);
    }

    function flip() { cardEl.classList.toggle('flipped'); }
    function next() { if(idx < data.length - 1) { idx++; update(); } }
    function prev() { if(idx > 0) { idx--; update(); } }
    function shuffle() {
        data.sort(() => Math.random() - 0.5);
        idx = 0;
        update();
    }

    document.addEventListener('keydown', (e) => {
        if(e.code === 'ArrowRight') next();
        if(e.code === 'ArrowLeft') prev();
        if(e.code === 'Space') flip();
    });

    update();
